name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

  publish-core:
    name: Publish @hostinglint/core
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if @hostinglint/core version already exists
        id: core-version
        working-directory: packages/core
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@hostinglint/core@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@hostinglint/core@${VERSION} already exists on npm, skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "@hostinglint/core@${VERSION} not found on npm, publishing."
          fi

      - name: Publish @hostinglint/core
        if: steps.core-version.outputs.exists == 'false'
        run: npm publish --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    name: Publish hostinglint CLI
    needs: publish-core
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if hostinglint version already exists
        id: cli-version
        working-directory: packages/cli
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "hostinglint@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "hostinglint@${VERSION} already exists on npm, skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "hostinglint@${VERSION} not found on npm, publishing."
          fi

      - name: Publish hostinglint
        if: steps.cli-version.outputs.exists == 'false'
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
